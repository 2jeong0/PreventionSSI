<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>틀린그림 찾기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ✅ 1. 시작 화면 -->
<div id="start-screen">
  <div class="input-card">
    <h2>✨ 틀린그림 찾기 ✨</h2>

    <input type="text" id="name" placeholder="이름 입력">
    <input type="text" id="id" placeholder="고유번호 입력">

    <button onclick="startGame()">시작하기 🎮</button>
  </div>
</div>


<!-- ✅ 2. 게임 화면 (처음엔 숨김) -->
<div id="game-screen" style="display:none;">

  <h2>틀린그림을 찾아보세요!</h2>

  <div class="game-container">
    <div class="image-box">
      <img src="img1.jpg">
    </div>
    <div class="image-box">
      <img src="img2.jpg" id="img2">
    </div>
  </div>

  <p id="result">찾은 개수: 0</p>

</div>

<script src="script.js"></script>

</body>
</html>
